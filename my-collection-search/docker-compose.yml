services:
  app:
    build:
      context: .
    container_name: myapp
    labels:
      - "deployed.revision=*${GIT_SHA:-dev}"  # change on every commit -> forces recreate
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-djplaylist}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-djplaylist}
      APPLE_MUSIC_TEAM_ID: ${APPLE_MUSIC_TEAM_ID}
      APPLE_MUSIC_KEY_ID: ${APPLE_MUSIC_KEY_ID}
      APPLE_MUSIC_PRIVATE_KEY: ${APPLE_MUSIC_PRIVATE_KEY}
      DISCOGS_USER_TOKEN: ${DISCOGS_USER_TOKEN}
      DISCOGS_USERNAME: ${DISCOGS_USERNAME}
      DISCOGS_FOLDER_ID: ${DISCOGS_FOLDER_ID}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      REDIS_URL: redis://redis:6379
      ESSENTIA_API_URL: http://essentia:8001/analyze
      ESSENTIA_DATA_DIR: /app/essentia-data
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID:-}
      B2_ACCOUNT_KEY: ${B2_ACCOUNT_KEY:-}

    depends_on:
      - db
      - redis
    volumes:
      - ${APP_AUDIO_MOUNT:-music_data:/app/audio}
      - db_dumps:/app/dumps
      - discogs_exports:/app/discogs_exports
      - cookie_data:/app/cookies
      - album_covers:/app/public/uploads/album-covers
      - essentia_data:/app/essentia-data

  migrate:
    build:
      context: .
    profiles:
      - migrate
    working_dir: /app
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-djplaylist}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-djplaylist}
    entrypoint: ["sh", "-c", "until pg_isready -h db -U ${POSTGRES_USER:-djplaylist}; do sleep 1; done && npm run migrate -- up"]
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-djplaylist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-djplaylist}
    volumes:
      - db_data:/var/lib/postgresql/data

  # watchtower:
  #   image: containrrr/watchtower
  #   restart: always
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - WATCHTOWER_CLEANUP=true
  #     - WATCHTOWER_POLL_INTERVAL=3600 # Check hourly
  #   depends_on:
  #     - app

  essentia:
    build:
      context: ../essentia-api
    container_name: essentia-api
    ports:
      - "8001:8001"

  ga-service:
    build:
      context: ../ga-service
    container_name: ga-service
    ports:
      - "8002:8002"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  download-worker:
    build:
      context: ../download-worker
    container_name: download-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-djplaylist}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-djplaylist}
      GAMDL_COOKIE_FILE: /app/cookies/gamdl_cookies.txt
      ESSENTIA_DATA_DIR: /app/essentia-data
    depends_on:
      - redis
      - db
    volumes:
      - ${WORKER_AUDIO_MOUNT:-music_data:/app/audio}
      - album_covers:/app/public/uploads/album-covers
      - cookie_data:/app/cookies  # Shared cookie storage with app service
      - essentia_data:/app/essentia-data
    restart: unless-stopped

volumes:
  db_data:
  music_data:
  db_dumps:
  discogs_exports:
  redis_data:
  cookie_data:
  album_covers:
  essentia_data:
