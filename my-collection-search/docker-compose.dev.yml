# Development overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    container_name: myapp-dev
    environment:
      NODE_ENV: development
      # Make file watching reliable in Docker on macOS/Windows
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "700"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "700"
    volumes:
      # Mount source code for live reload
      - .:/app
      # Keep node_modules inside the container image
      - /app/node_modules
      - ${APP_AUDIO_MOUNT:-music_data:/app/audio}
      - essentia_data:/app/essentia-data
      - db_dumps:/app/dumps
      - discogs_exports:/app/discogs_exports
      - spotify_exports:/app/spotify_exports
    # Run Next.js in dev mode and listen on all interfaces
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"

  migrate:
    volumes:
      - .:/app:ro

  essentia:
    container_name: essentia-api-dev

  ga-service:
    container_name: ga-service-dev

  download-worker:
    container_name: download-worker-dev
    environment:
      GAMDL_COOKIE_FILE: /app/cookies/music.apple.com_cookies.txt
    volumes:
      - ${WORKER_AUDIO_MOUNT:-music_data:/app/audio}
      - album_covers:/app/public/uploads/album-covers
      - essentia_data:/app/essentia-data
      - ./cookies:/app/cookies:ro  # Mount local cookies directory as read-only
