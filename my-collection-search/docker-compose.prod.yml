# Production compose template extending docker-compose.yml.
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    extends:
      file: docker-compose.yml
      service: app
    image: ghcr.io/saegey/myapp:${IMAGE_TAG:-latest}
    container_name: myapp
    environment:
      APPLE_MUSIC_PRIVATE_KEY_PATH: ${APPLE_MUSIC_PRIVATE_KEY_PATH:-/app/audio/AuthKey_${APPLE_MUSIC_KEY_ID}.p8}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      SENTRY_DSN: ${SENTRY_DSN}
      AIRPLAY_AUTO_PAUSE: ${AIRPLAY_AUTO_PAUSE:-true}
    volumes:
      - ${APP_AUDIO_MOUNT:-music_data:/app/audio}
      - db_dumps:/app/dumps
      - discogs_exports:/app/discogs_exports
      - spotify_exports:/app/spotify_exports
      - cookie_data:/app/cookies
      - album_covers:/app/public/uploads/album-covers
      - essentia_data:/app/essentia-data
      - /var/run/docker.sock:/var/run/docker.sock  # Required for AirPlay interruption control
    devices:
      - /dev/snd:/dev/snd  # Pass through all audio devices
    restart: unless-stopped

  migrate:
    extends:
      file: docker-compose.yml
      service: migrate
    image: ghcr.io/saegey/myapp:${IMAGE_TAG:-latest}

  db:
    extends:
      file: docker-compose.yml
      service: db

  meili:
    extends:
      file: docker-compose.yml
      service: meili

  essentia:
    extends:
      file: docker-compose.yml
      service: essentia
    image: ghcr.io/saegey/essentia-api:${IMAGE_TAG:-latest}
    container_name: essentia-api

  ga-service:
    extends:
      file: docker-compose.yml
      service: ga-service
    image: ghcr.io/saegey/ga-service:${IMAGE_TAG:-latest}
    container_name: ga-service

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  download-worker:
    extends:
      file: docker-compose.yml
      service: download-worker
    image: ghcr.io/saegey/download-worker:${IMAGE_TAG:-latest}
    container_name: download-worker
    restart: unless-stopped

  mpd:
    extends:
      file: docker-compose.yml
      service: mpd
    volumes:
      - ${MPD_AUDIO_MOUNT:-music_data:/var/lib/mpd/music:ro}  # Read-only music files
      - mpd_data:/var/lib/mpd  # MPD state/database
      - ./config/mpd.conf:/etc/mpd.conf.template:ro
    environment:
      - AUDIO_DEVICE=${AUDIO_DEVICE:-hw:0,0}
    command: sh -c "sed 's|\$${AUDIO_DEVICE}|'\"$$AUDIO_DEVICE\"'|g' /etc/mpd.conf.template > /etc/mpd.conf && mpd --no-daemon /etc/mpd.conf"

  # AirPlay Receiver
  # Provides AirPlay streaming to your USB DAC
  # Uses exclusive hardware access - interrupts app playback when active
  shairport-sync:
    image: mikebrady/shairport-sync:latest
    container_name: shairport-sync
    network_mode: host  # Required for AirPlay discovery (mDNS/Bonjour)
    restart: unless-stopped
    environment:
      # AirPlay device name (shows up in iOS/Mac AirPlay menu)
      - AIRPLAY_NAME=${AIRPLAY_NAME:-GrooveNET Audio}
      # Enable auto-pause of app when AirPlay starts
      - AIRPLAY_AUTO_PAUSE=${AIRPLAY_AUTO_PAUSE:-true}
      # App URL for sending pause commands (since using host network mode)
      - APP_URL=${APP_URL:-http://localhost:3000}
      # Audio device configuration
      - AUDIO_DEVICE=${AUDIO_DEVICE:-plughw:1,0}
    devices:
      - /dev/snd:/dev/snd  # Share audio device with app
    volumes:
      - ./config/shairport-sync.conf:/etc/shairport-sync.conf.template:ro
      - ./scripts/airplay-session-start.sh:/usr/local/bin/airplay-session-start.sh:ro
      - ./scripts/airplay-session-end.sh:/usr/local/bin/airplay-session-end.sh:ro
      - ./scripts/shairport-entrypoint.sh:/usr/local/bin/shairport-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/shairport-entrypoint.sh"]
    # Exclusive hardware access mode - only one service can use DAC at a time

volumes:
  db_data:
    name: teststack_db_data
    external: true
  meili_data:
    name: teststack_meili_data
    external: true
  music_data:
    name: teststack_music_data
    external: true
  db_dumps:
    name: teststack_db_dumps
    external: true
  discogs_exports:
    name: teststack_discogs_exports
    external: true
  spotify_exports:
    name: teststack_spotify_exports
    external: true
  redis_data:
    name: teststack_redis_data
    external: true
  cookie_data:
    name: teststack_cookie_data
    external: true
  album_covers:
    name: teststack_album_covers
    external: true
  essentia_data:
    name: teststack_essentia_data
    external: true
  mpd_data:
    name: teststack_mpd_data
    external: true
