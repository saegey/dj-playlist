# Production compose template extending docker-compose.yml.
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: ghcr.io/saegey/myapp:${IMAGE_TAG:-latest}
    container_name: myapp
    environment:
      APPLE_MUSIC_PRIVATE_KEY_PATH: ${APPLE_MUSIC_PRIVATE_KEY_PATH:-/app/audio/AuthKey_${APPLE_MUSIC_KEY_ID}.p8}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - ${APP_AUDIO_MOUNT:-music_data:/app/audio}
      - db_dumps:/app/dumps
      - discogs_exports:/app/discogs_exports
      - cookie_data:/app/cookies
      - album_covers:/app/public/uploads/album-covers
      - essentia_data:/app/essentia-data
    restart: unless-stopped

  migrate:
    image: ghcr.io/saegey/myapp:${IMAGE_TAG:-latest}

  essentia:
    image: ghcr.io/saegey/essentia-api:${IMAGE_TAG:-latest}
    container_name: essentia-api

  ga-service:
    image: ghcr.io/saegey/ga-service:${IMAGE_TAG:-latest}
    container_name: ga-service

  download-worker:
    image: ghcr.io/saegey/download-worker:${IMAGE_TAG:-latest}
    container_name: download-worker
    restart: unless-stopped

volumes:
  db_data:
    name: teststack_db_data_v2
    external: true
  music_data:
    name: teststack_music_data
    external: true
  db_dumps:
    name: teststack_db_dumps
    external: true
  discogs_exports:
    name: teststack_discogs_exports
    external: true
  redis_data:
    name: teststack_redis_data
    external: true
  cookie_data:
    name: teststack_cookie_data
    external: true
  album_covers:
    name: teststack_album_covers
    external: true
  essentia_data:
    name: teststack_essentia_data
    external: true
